  <rect x="772" y="290" width="100" height="36" rx="7" fill="#f3f4f6" stroke="#9ca3af" stroke-width="0.8"/>
  <text x="822" y="308" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">PostgreSQL</text>

  <!-- DeepL API -->
  <rect x="772" y="490" width="100" height="36" rx="7" fill="#f3f4f6" stroke="#9ca3af" stroke-width="0.8"/>
  <text x="822" y="508" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">DeepL API</text>

  <!-- EventAdapterRepository -->
  <rect x="720" y="162" width="144" height="52" rx="7" fill="#ccfbef" stroke="#0f6e56" stroke-width="0.8"/>
  <text x="792" y="181" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">EventAdapterRepository</text>
  <text x="792" y="198" text-anchor="middle" font-size="11" fill="#0f6e56">implements EventRepositoryPort</text>

  <!-- EventEntity + EventRepositoryMapper -->
  <rect x="720" y="230" width="144" height="52" rx="7" fill="#ccfbef" stroke="#0f6e56" stroke-width="0.8"/>
  <text x="792" y="249" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">EventEntity</text>
  <text x="792" y="266" text-anchor="middle" font-size="11" fill="#0f6e56">EventRepositoryMapper</text>

  <!-- TicketAdapterRepository -->
  <rect x="720" y="330" width="144" height="52" rx="7" fill="#ccfbef" stroke="#0f6e56" stroke-width="0.8"/>
  <text x="792" y="349" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">TicketAdapterRepository</text>
  <text x="792" y="366" text-anchor="middle" font-size="11" fill="#0f6e56">implements TicketRepositoryPort</text>

  <!-- TicketEntity + SalesEntity + TicketRepositoryMapper -->
  <rect x="720" y="398" width="144" height="64" rx="7" fill="#ccfbef" stroke="#0f6e56" stroke-width="0.8"/>
  <text x="792" y="416" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">TicketEntity  ·  SalesEntity</text>
  <text x="792" y="433" text-anchor="middle" font-size="11" fill="#0f6e56">TicketRepositoryMapper</text>
  <text x="792" y="450" text-anchor="middle" font-size="11" fill="#0f6e56">SalesRepository</text>

  <!-- TranslationRestClient -->
  <rect x="720" y="480" width="144" height="52" rx="7" fill="#ccfbef" stroke="#0f6e56" stroke-width="0.8"/>
  <text x="792" y="499" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">TranslationRestClient</text>
  <text x="792" y="516" text-anchor="middle" font-size="11" fill="#0f6e56">implements GetTranslationAdapter</text>

  <!-- domain OUT ports → adapters (dashed purple) -->
  <path d="M598 198 L706 198 L706 188 L718 188" fill="none" stroke="#7f77dd" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <path d="M598 352 L706 352 L706 356 L718 356" fill="none" stroke="#7f77dd" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <path d="M598 216 L660 216 L660 506 L718 506" fill="none" stroke="#7f77dd" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

  <!-- adapter → entity+mapper -->
  <line x1="792" y1="214" x2="792" y2="228" stroke="#1d9e75" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="792" y1="382" x2="792" y2="396" stroke="#1d9e75" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- entity → postgres -->
  <line x1="792" y1="282" x2="792" y2="288" stroke="#9ca3af" stroke-width="0.8" marker-end="url(#arrow)"/>
  <line x1="792" y1="326" x2="792" y2="328" stroke="#9ca3af" stroke-width="0.8" marker-end="url(#arrow)"/>
  <line x1="864" y1="430" x2="870" y2="430" stroke="#9ca3af" stroke-width="0.8"/>
  <line x1="870" y1="430" x2="870" y2="308" stroke="#9ca3af" stroke-width="0.8"/>
  <line x1="870" y1="308" x2="874" y2="308" stroke="#9ca3af" stroke-width="0.8" marker-end="url(#arrow)"/>

  <!-- translation → deepL -->
  <line x1="864" y1="506" x2="870" y2="506" stroke="#9ca3af" stroke-width="0.8" marker-end="url(#arrow)"/>

  <!-- ══ LEGEND ══ -->
  <rect x="18" y="680" width="864" height="90" rx="10" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.8"/>
  <text x="450" y="700" text-anchor="middle" font-size="12" font-weight="600" fill="#1e1e1e">Legenda</text>

  <rect x="36" y="712" width="12" height="12" rx="2" fill="#ddd9fc" stroke="#534ab7" stroke-width="0.8"/>
  <text x="54" y="722" font-size="11" fill="#374151">domain — records puros, sem dependência de framework</text>

  <rect x="36" y="730" width="12" height="12" rx="2" fill="#dbeafe" stroke="#185fa5" stroke-width="0.8"/>
  <text x="54" y="740" font-size="11" fill="#374151">application — use cases, orquestração de negócio</text>

  <rect x="36" y="748" width="12" height="12" rx="2" fill="#ccfbef" stroke="#0f6e56" stroke-width="0.8"/>
  <text x="54" y="758" font-size="11" fill="#374151">adapters — controllers REST, repositories R2DBC, clients externos</text>

  <line x1="440" y1="718" x2="480" y2="718" stroke="#7f77dd" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="488" y="722" font-size="11" fill="#374151">porta de saída (domain define, adapter implementa)</text>

  <line x1="440" y1="736" x2="480" y2="736" stroke="#378add" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="488" y="740" font-size="11" fill="#374151">use case → port (injeção de dependência)</text>

  <line x1="440" y1="754" x2="480" y2="754" stroke="#1d9e75" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="488" y="758" font-size="11" fill="#374151">fluxo interno do adapter (entity / mapper)</text>

</svg>
