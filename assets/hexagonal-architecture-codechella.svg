<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="780" viewBox="0 0 900 780" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="900" height="780" fill="#ffffff" rx="12"/>

  <!-- TITLE -->
  <text x="450" y="34" text-anchor="middle" font-size="16" font-weight="600" fill="#1e1e1e">Arquitetura Hexagonal — Codechella</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#6b7280">Spring Boot 4 · WebFlux · R2DBC · DDD</text>

  <!-- ── ADAPTERS container ── -->
  <rect x="18" y="68" width="864" height="598" rx="14" fill="#f0fdf9" stroke="#0f6e56" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="36" y="88" font-size="11" font-weight="600" fill="#0f6e56">adapters</text>

  <!-- ── APPLICATION container ── -->
  <rect x="188" y="100" width="524" height="444" rx="11" fill="#eff6ff" stroke="#185fa5" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="206" y="118" font-size="11" font-weight="600" fill="#185fa5">application</text>

  <!-- ── DOMAIN container ── -->
  <rect x="288" y="132" width="324" height="338" rx="9" fill="#eeedfe" stroke="#534ab7" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="306" y="150" font-size="11" font-weight="600" fill="#3c3489">domain  —  records puros, sem framework</text>

  <!-- ══ DOMAIN blocks ══ -->

  <!-- Event aggregate -->
  <rect x="302" y="162" width="296" height="72" rx="7" fill="#ddd9fc" stroke="#534ab7" stroke-width="0.8"/>
  <text x="450" y="182" text-anchor="middle" font-size="13" font-weight="600" fill="#26215c">Event  ·  EventType</text>
  <text x="450" y="200" text-anchor="middle" font-size="11" fill="#3c3489">EventRepositoryPort</text>
  <text x="450" y="216" text-anchor="middle" font-size="11" fill="#3c3489">GetTranslationAdapter  (OUT port)</text>

  <!-- GetTextTranslatedService -->
  <rect x="302" y="248" width="296" height="50" rx="7" fill="#ddd9fc" stroke="#534ab7" stroke-width="0.8"/>
  <text x="450" y="267" text-anchor="middle" font-size="13" font-weight="600" fill="#26215c">GetTextTranslatedService</text>
  <text x="450" y="284" text-anchor="middle" font-size="11" fill="#3c3489">LanguageTag  ·  delega para OUT port</text>

  <!-- Ticket aggregate -->
  <rect x="302" y="314" width="296" height="72" rx="7" fill="#ddd9fc" stroke="#534ab7" stroke-width="0.8"/>
  <text x="450" y="334" text-anchor="middle" font-size="13" font-weight="600" fill="#26215c">Ticket  ·  Sales  ·  Order  ·  Type</text>
  <text x="450" y="352" text-anchor="middle" font-size="11" fill="#3c3489">TicketRepositoryPort</text>
  <text x="450" y="368" text-anchor="middle" font-size="11" fill="#3c3489">createTicketWithPurchase()</text>

  <!-- domain internal arrow: service → OUT port -->
  <line x1="450" y1="248" x2="450" y2="236" stroke="#7f77dd" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- ══ USE CASES (vertical labels) ══ -->

  <!-- Event use cases -->
  <rect x="198" y="162" width="96" height="158" rx="7" fill="#dbeafe" stroke="#185fa5" stroke-width="0.8"/>
  <text x="246" y="242" text-anchor="middle" font-size="12" font-weight="600" fill="#0c447c" transform="rotate(-90,246,242)">Event use cases  (7)</text>

  <!-- Ticket use cases -->
  <rect x="198" y="334" width="96" height="130" rx="7" fill="#dbeafe" stroke="#185fa5" stroke-width="0.8"/>
  <text x="246" y="399" text-anchor="middle" font-size="12" font-weight="600" fill="#0c447c" transform="rotate(-90,246,399)">Ticket use cases  (7)</text>

  <!-- use cases → domain ports -->
  <line x1="294" y1="220" x2="300" y2="220" stroke="#378add" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="294" y1="380" x2="300" y2="380" stroke="#378add" stroke-width="1.3" marker-end="url(#arrow)"/>

