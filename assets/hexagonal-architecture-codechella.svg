  <!-- HTTP Client -->
  <rect x="28" y="210" width="100" height="36" rx="7" fill="#f3f4f6" stroke="#9ca3af" stroke-width="0.8"/>
  <text x="78" y="228" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">HTTP client</text>

  <!-- EventController -->
  <rect x="28" y="264" width="100" height="52" rx="7" fill="#ccfbef" stroke="#0f6e56" stroke-width="0.8"/>
  <text x="78" y="283" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Event</text>
  <text x="78" y="300" text-anchor="middle" font-size="11" fill="#0f6e56">Controller</text>

  <!-- TicketController -->
  <rect x="28" y="334" width="100" height="52" rx="7" fill="#ccfbef" stroke="#0f6e56" stroke-width="0.8"/>
  <text x="78" y="353" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Ticket</text>
  <text x="78" y="370" text-anchor="middle" font-size="11" fill="#0f6e56">Controller</text>

  <!-- REST Mappers + DTOs -->
  <rect x="28" y="404" width="100" height="52" rx="7" fill="#ccfbef" stroke="#0f6e56" stroke-width="0.8"/>
  <text x="78" y="422" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">REST Mappers</text>
  <text x="78" y="439" text-anchor="middle" font-size="11" fill="#0f6e56">DTOs · records</text>

  <!-- client → controller arrows -->
  <line x1="78" y1="246" x2="78" y2="262" stroke="#6b7280" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="128" y1="288" x2="196" y2="234" stroke="#1d9e75" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="128" y1="360" x2="196" y2="390" stroke="#1d9e75" stroke-width="1.3" marker-end="url(#arrow)"/>

